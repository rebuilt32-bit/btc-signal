name: Collect BTC Signal Data

on:
  schedule:
    - cron: '* * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run collection script
        run: python collect.py

      - name: Run analysis script
        run: python analyze.py

      - name: Run calibration script
        run: python calibrate.py

      - name: Run signal attribution
        run: python signal_attribution.py

      - name: Run disagreement test
        run: python disagreement_test.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --quiet --cached; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data update"
          for attempt in 1 2 3; do
            if git push 2>&1; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, fetching and rebasing"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase conflicts detected, resolving by keeping our version of data files"
              git checkout --ours data/
              git add data/
              git rebase --continue || git rebase --skip
            fi
          done
          echo "Could not push after 3 attempts. Skipping this run's data; next run will regenerate."
          git rebase --abort 2>/dev/null || true
          exit 0
