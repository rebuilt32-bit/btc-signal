name: Collect BTC Signal Data

on:
  schedule:
    - cron: '* * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run collection script
        run: python collect.py
        name: Collect BTC Signal Data

on:
  schedule:
    - cron: '* * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run collection script
        run: python collect.py

      - name: Run analysis script
        run: python analyze.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --quiet --cached; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data update"
          if ! git push; then
            echo "Push rejected, rebasing onto latest main and retrying"
            git pull --rebase origin main
            git push
          fi

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --quiet --cached; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data update"
          # Try push; if rejected, fetch+rebase+retry once
          if ! git push; then
            echo "Push rejected, rebasing onto latest main and retrying"
            git pull --rebase origin main
            git push
          fi
